name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Отменяем устаревшие прогоны при новом пуше в ту же ветку/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (с кэшем)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Модель Vosk (~45 MB) не в git: первый прогон качает её в задаче fetchVoskModel,
      # дальше восстанавливаем из кэша по версии (ключ привязан к версии модели).
      - name: Кэш модели Vosk
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/vosk-model-small-ru
          key: vosk-model-small-ru-0.22

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload test reports (при падении)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
          if-no-files-found: ignore
